
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 마음을 전달해드립니다</title>
    <meta name="description" content="받는 사람을 비워두거나 직접 적어서, 따뜻하게 전할 수 있는 오늘의 마음 문구를 추천받아보세요.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="오늘의 마음을 전달해드립니다">
    <meta property="og:description" content="받는 사람을 비워두거나 직접 적어서, 따뜻하게 전할 수 있는 오늘의 마음 문구를 추천받아보세요.">
    <meta property="og:site_name" content="오늘의 마음을 전달해드립니다">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="오늘의 마음을 전달해드립니다">
    <meta name="twitter:description" content="받는 사람을 비워두거나 직접 적어서, 따뜻하게 전할 수 있는 오늘의 마음 문구를 추천받아보세요.">
    <style>
        :root {
            --bg: #f8f8f8;
            --panel: #ffffff;
            --text: #292a32;
            --muted: #74747b;
            --pink: #ff0558;
            --pink-dark: #d90047;
            --rose: #fff4f7;
            --border: #e5e5e8;
            --soft-border: #f0f0f2;
            --shadow: rgba(0, 0, 0, 0.08);
            --accent-yellow: #ffe66d;
            --accent-mint: #8ee6d2;
            --accent-lilac: #cdbdff;
            --body-bg: var(--bg);
            --app-bg: transparent;
            --hero-bg: #ffffff;
            --message-bg: #ffffff;
        }

        body[data-theme="white"] {
            --bg: #fbfbfc;
            --text: #243040;
            --muted: #667085;
            --pink: #ff0558;
            --pink-dark: #d90047;
            --rose: #ffffff;
            --border: #e3e6eb;
            --soft-border: #eef0f3;
            --shadow: rgba(38, 45, 58, 0.08);
            --body-bg: #fbfbfc;
            --hero-bg: #ffffff;
            --message-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Noto Sans KR", sans-serif;
            color: var(--text);
            background: var(--body-bg);
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
        }

        .topbar-inner {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 18px;
            width: min(1040px, 100%);
            margin: 0 auto;
            padding: 13px 20px;
        }

        .brand {
            color: var(--pink);
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            gap: 18px;
            color: #55565d;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .search-pill {
            display: flex;
            align-items: center;
            min-height: 38px;
            border: 1px solid var(--soft-border);
            border-radius: 9px;
            background: #f5f5f7;
            color: #8a8b91;
            font-size: 0.92rem;
            padding: 0 14px;
            white-space: nowrap;
        }

        .page {
            min-height: calc(100vh - 65px);
            padding: 0 20px 48px;
        }

        .app {
            position: relative;
            width: min(960px, 100%);
            margin: 0 auto;
            background: var(--app-bg);
        }

        .app::before {
            content: none;
        }

        .hero {
            position: relative;
            border-bottom: 1px solid var(--border);
            background: var(--hero-bg);
            padding: 42px 0 30px;
        }

        .theme-bar {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .theme-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: #f6f6f7;
            padding: 4px;
        }

        .theme-option {
            min-height: 36px;
            border-radius: 999px;
            color: var(--muted);
            background: transparent;
            box-shadow: none;
            font-size: 0.92rem;
            padding: 6px 14px;
        }

        .theme-option.active {
            color: #fff;
            background: var(--pink);
            box-shadow: 0 8px 20px rgba(255, 5, 88, 0.22);
        }

        .hero::after {
            content: none;
        }

        .hero-note {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 5, 88, 0.16);
            border-radius: 999px;
            background: var(--rose);
            color: var(--pink-dark);
            font-size: 0.9rem;
            font-weight: 700;
            padding: 8px 12px;
        }

        .hero-note::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--pink);
            box-shadow: 12px 0 0 var(--accent-yellow), 24px 0 0 var(--accent-mint);
        }

        h1 {
            position: relative;
            z-index: 1;
            margin: 0;
            max-width: 680px;
            font-size: clamp(2rem, 6vw, 3.35rem);
            line-height: 1.12;
            letter-spacing: 0;
        }

        .subtitle {
            position: relative;
            z-index: 1;
            margin: 14px 0 0;
            max-width: 620px;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .content {
            display: grid;
            gap: 24px;
            padding: 28px 0 0;
        }

        .message-box {
            position: relative;
            display: grid;
            min-height: 190px;
            place-items: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--message-bg);
            box-shadow: 0 12px 32px var(--shadow);
            padding: 34px 28px 30px;
        }

        .message-box::before {
            content: "";
            position: absolute;
            left: 18px;
            top: 18px;
            width: 48px;
            height: 6px;
            border-radius: 999px;
            background: var(--pink);
            opacity: 0.95;
        }

        .recipient-panel {
            display: grid;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #ffffff;
            padding: 18px;
        }

        .recipient-panel label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .recipient-row {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr auto;
        }

        #recipient-name {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: #f8f8fa;
            color: var(--text);
            font: inherit;
            min-height: 52px;
            padding: 12px 18px;
        }

        #recipient-name:focus-visible {
            outline: 3px solid rgba(239, 111, 154, 0.28);
            outline-offset: 2px;
        }

        #apply-recipient-button {
            color: #fff;
            background: var(--pink);
            box-shadow: 0 10px 24px rgba(255, 5, 88, 0.18);
            padding: 0 18px;
            white-space: nowrap;
        }

        .recipient-help {
            margin: 0;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        #message {
            margin: 0;
            text-align: center;
            font-size: clamp(1.35rem, 4vw, 2rem);
            font-weight: 700;
            line-height: 1.45;
            word-break: keep-all;
        }

        .name-blank {
            display: inline-block;
            width: clamp(4.5rem, 18vw, 7.5rem);
            height: 0.72em;
            margin: 0 0.12em;
            border-bottom: 4px solid var(--pink);
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, rgba(255, 5, 88, 0.1), transparent);
            vertical-align: -0.02em;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            min-height: 52px;
            border: 0;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        button:active {
            transform: translateY(1px);
        }

        button:focus-visible {
            outline: 3px solid rgba(239, 111, 154, 0.35);
            outline-offset: 3px;
        }

        #recommend-button {
            color: #fff;
            background: var(--pink);
            box-shadow: 0 12px 28px rgba(255, 5, 88, 0.24);
        }

        #copy-button {
            color: var(--pink-dark);
            background: #fff;
            border: 1px solid var(--border);
        }

        #copy-button.copied {
            color: #fff;
            background: #b44d74;
            border-color: #b44d74;
        }

        .date-line {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .partnership {
            margin-top: 28px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #ffffff;
            margin-top: 0;
            padding: 22px;
        }

        .partnership h2 {
            margin: 0;
            font-size: 1.45rem;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .partnership-copy {
            margin: 8px 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        .partnership-form {
            display: grid;
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .field label {
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: #f8f8fa;
            color: var(--text);
            font: inherit;
            line-height: 1.4;
            padding: 12px 14px;
        }

        .field textarea {
            min-height: 116px;
            resize: vertical;
        }

        .field input:focus-visible,
        .field select:focus-visible,
        .field textarea:focus-visible {
            outline: 3px solid rgba(239, 111, 154, 0.28);
            outline-offset: 2px;
        }

        #partnership-submit {
            color: #fff;
            background: var(--pink);
            box-shadow: 0 12px 28px rgba(255, 5, 88, 0.2);
        }

        .form-status {
            min-height: 24px;
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-status.success {
            color: #227447;
        }

        .form-status.error {
            color: #b42318;
        }

        @media (max-width: 560px) {
            .topbar-inner {
                grid-template-columns: 1fr auto;
                gap: 12px;
                padding: 12px 16px;
            }

            .nav-links {
                display: none;
            }

            .search-pill {
                font-size: 0;
                min-width: 38px;
                padding: 0;
                justify-content: center;
            }

            .search-pill::before {
                content: "검색";
                font-size: 0.88rem;
            }

            .hero,
            .content {
                padding-left: 0;
                padding-right: 0;
            }

            .hero-note {
                max-width: calc(100% - 72px);
            }

            .theme-bar {
                justify-content: flex-start;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .recipient-row {
                grid-template-columns: 1fr;
            }

            #apply-recipient-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">마음전달</div>
            <nav class="nav-links" aria-label="주요 메뉴">
                <span>추천</span>
                <span>편지</span>
                <span>제휴</span>
            </nav>
            <div class="search-pill" aria-label="문구 검색">콘텐츠, 마음, 문구 검색</div>
        </div>
    </header>

    <main class="page">
        <section class="app" aria-label="오늘의 마음 전달 문구 추천기">
            <header class="hero">
                <div class="theme-bar" aria-label="화면 모드 선택">
                    <div class="theme-toggle" role="group" aria-label="테마 선택">
                        <button class="theme-option active" type="button" data-theme-value="pink">핑크 모드</button>
                        <button class="theme-option" type="button" data-theme-value="white">화이트 모드</button>
                    </div>
                </div>
                <div class="hero-note">daily tiny letter</div>
                <h1>오늘의 마음을 전달해드립니다</h1>
                <p class="subtitle">받는 사람을 비워두거나 직접 적어서, 따뜻하게 전할 수 있는 한 문장을 골라줘요.</p>
            </header>

            <section class="content">
                <div class="recipient-panel">
                    <label for="recipient-name">받는 사람</label>
                    <div class="recipient-row">
                        <input id="recipient-name" type="text" autocomplete="off" placeholder="비워두면 빈칸으로 편지를 만들어요">
                        <button id="apply-recipient-button" type="button">적용</button>
                    </div>
                    <p class="recipient-help">이름을 적으면 문장에 바로 들어가고, 비워두면 빈칸 편지로 남아요.</p>
                </div>

                <div class="message-box" aria-live="polite">
                    <p id="message"></p>
                </div>

                <div class="actions">
                    <button id="recommend-button" type="button">문구 추천받기</button>
                    <button id="copy-button" type="button">문구 복사하기</button>
                </div>

                <p class="date-line" id="date-line"></p>

                <section class="partnership" aria-labelledby="partnership-title">
                    <h2 id="partnership-title">제휴 문의</h2>
                    <p class="partnership-copy">함께 해보고 싶은 제안이 있다면 간단히 남겨주세요.</p>

                    <form class="partnership-form" id="partnership-form" action="https://formspree.io/f/xvzdlljk" method="POST">
                        <div class="field">
                            <label for="partner-name">이름</label>
                            <input id="partner-name" name="name" type="text" autocomplete="name" required>
                        </div>

                        <div class="field">
                            <label for="partner-email">이메일</label>
                            <input id="partner-email" name="email" type="email" autocomplete="email" required>
                        </div>

                        <div class="field">
                            <label for="partner-type">제휴 유형</label>
                            <select id="partner-type" name="partnership_type" required>
                                <option value="">선택해주세요</option>
                                <option value="brand">브랜드 제휴</option>
                                <option value="content">콘텐츠 협업</option>
                                <option value="event">이벤트/프로모션</option>
                                <option value="other">기타 제안</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="partner-message">제안 내용</label>
                            <textarea id="partner-message" name="message" placeholder="제휴 목적, 진행 방식, 연락 가능한 시간 등을 적어주세요." required></textarea>
                        </div>

                        <input type="hidden" name="_subject" value="오늘의 마음을 전달해드립니다 제휴 문의">
                        <button id="partnership-submit" type="submit">제휴 문의 보내기</button>
                        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
                    </form>
                </section>
            </section>
        </section>
    </main>

    <script>
        const messages = [
            "{name}, 오늘도 네가 해내는 모든 순간을 믿고 응원해.",
            "{name}, 완벽하지 않아도 괜찮아. 너는 충분히 잘하고 있어.",
            "오늘 하루도 {name}답게 천천히, 단단하게 걸어가면 돼.",
            "{name}, 네가 웃는 순간들이 오늘 더 많이 생기길 바라.",
            "힘든 일이 있어도 {name}도 분명 잘 넘길 수 있는 사람이야.",
            "{name}, 오늘의 작은 노력들이 내일의 너를 더 빛나게 할 거야.",
            "네 편에서 늘 응원하고 있어. {name}, 오늘도 파이팅.",
            "{name}, 쉬어가도 괜찮아. 중요한 건 네 마음을 지키는 거야.",
            "오늘도 {name}의 따뜻함과 성실함이 분명 좋은 곳에 닿을 거야.",
            "{name}, 너는 생각보다 훨씬 강하고 멋진 사람이야.",
            "조급해하지 않아도 돼. {name}도 {name}의 속도로 잘 가고 있어.",
            "{name}, 오늘 하루가 너에게 다정한 기억으로 남았으면 좋겠어."
        ];

        const messageElement = document.getElementById("message");
        const recipientNameInput = document.getElementById("recipient-name");
        const applyRecipientButton = document.getElementById("apply-recipient-button");
        const recommendButton = document.getElementById("recommend-button");
        const copyButton = document.getElementById("copy-button");
        const dateLine = document.getElementById("date-line");
        const themeButtons = document.querySelectorAll(".theme-option");
        const partnershipForm = document.getElementById("partnership-form");
        const partnershipSubmit = document.getElementById("partnership-submit");
        const formStatus = document.getElementById("form-status");
        let currentMessage = "";
        let currentTemplate = "";

        function getRecipientName() {
            return recipientNameInput.value.trim();
        }

        function formatMessage(template) {
            return template.replaceAll("{name}", getRecipientName() || "_____");
        }

        function renderMessage(template) {
            const recipientName = getRecipientName();
            const parts = template.split("{name}");
            messageElement.replaceChildren();

            parts.forEach((part, index) => {
                messageElement.append(document.createTextNode(part));

                if (index < parts.length - 1) {
                    if (recipientName) {
                        messageElement.append(document.createTextNode(recipientName));
                    } else {
                        const blank = document.createElement("span");
                        blank.className = "name-blank";
                        blank.setAttribute("aria-label", "빈칸");
                        messageElement.append(blank);
                    }
                }
            });
        }

        function pickMessage() {
            if (messages.length === 1) {
                return messages[0];
            }

            let nextMessage = currentTemplate;
            while (nextMessage === currentTemplate) {
                const index = Math.floor(Math.random() * messages.length);
                nextMessage = messages[index];
            }
            return nextMessage;
        }

        function recommendMessage() {
            currentTemplate = pickMessage();
            currentMessage = formatMessage(currentTemplate);
            renderMessage(currentTemplate);
            copyButton.textContent = "문구 복사하기";
            copyButton.classList.remove("copied");
        }

        function refreshCurrentMessage() {
            if (!currentTemplate) {
                recommendMessage();
                return;
            }

            currentMessage = formatMessage(currentTemplate);
            renderMessage(currentTemplate);
            copyButton.textContent = "문구 복사하기";
            copyButton.classList.remove("copied");
        }

        async function copyMessage() {
            if (!currentMessage) {
                return;
            }

            const copied = await copyText(currentMessage);
            copyButton.textContent = copied ? "복사 완료" : "복사 실패";
            copyButton.classList.toggle("copied", copied);

            window.setTimeout(() => {
                copyButton.textContent = "문구 복사하기";
                copyButton.classList.remove("copied");
            }, 1600);
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (error) {
                    console.warn("Clipboard API failed, using fallback.", error);
                }
            }

            return fallbackCopyText(text);
        }

        function fallbackCopyText(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.setAttribute("readonly", "");
            textArea.style.position = "fixed";
            textArea.style.top = "-1000px";
            textArea.style.left = "-1000px";
            document.body.appendChild(textArea);
            textArea.select();

            try {
                return document.execCommand("copy");
            } catch (error) {
                console.warn("Fallback copy failed.", error);
                return false;
            } finally {
                document.body.removeChild(textArea);
            }
        }

        function setDateLine() {
            const today = new Intl.DateTimeFormat("ko-KR", {
                dateStyle: "full"
            }).format(new Date());
            dateLine.textContent = today;
        }

        function setTheme(theme) {
            const nextTheme = theme === "white" ? "white" : "pink";
            document.body.dataset.theme = nextTheme;
            localStorage.setItem("yeji-theme", nextTheme);

            themeButtons.forEach((button) => {
                const isActive = button.dataset.themeValue === nextTheme;
                button.classList.toggle("active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        async function submitPartnershipForm(event) {
            event.preventDefault();

            formStatus.textContent = "전송 중입니다...";
            formStatus.className = "form-status";
            partnershipSubmit.disabled = true;

            try {
                const response = await fetch(partnershipForm.action, {
                    method: "POST",
                    body: new FormData(partnershipForm),
                    headers: {
                        Accept: "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error("Formspree request failed");
                }

                partnershipForm.reset();
                formStatus.textContent = "제휴 문의가 전송되었습니다.";
                formStatus.className = "form-status success";
            } catch (error) {
                console.warn("Partnership form failed.", error);
                formStatus.textContent = "전송에 실패했습니다. 잠시 후 다시 시도해주세요.";
                formStatus.className = "form-status error";
            } finally {
                partnershipSubmit.disabled = false;
            }
        }

        recommendButton.addEventListener("click", recommendMessage);
        applyRecipientButton.addEventListener("click", refreshCurrentMessage);
        recipientNameInput.addEventListener("input", refreshCurrentMessage);
        copyButton.addEventListener("click", copyMessage);
        themeButtons.forEach((button) => {
            button.addEventListener("click", () => {
                setTheme(button.dataset.themeValue);
            });
        });
        partnershipForm.addEventListener("submit", submitPartnershipForm);

        setTheme(localStorage.getItem("yeji-theme"));
        setDateLine();
        recommendMessage();
    </script>
</body>
</html>
