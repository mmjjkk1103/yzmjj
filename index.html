
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예지에게 보내는 오늘의 응원</title>
    <style>
        :root {
            --bg: #fff6f8;
            --panel: #ffffff;
            --text: #39252b;
            --muted: #7b5b64;
            --pink: #ef6f9a;
            --pink-dark: #cf4676;
            --peach: #ffd2c2;
            --rose: #ffe8ef;
            --border: #f4bdcc;
            --shadow: rgba(177, 72, 105, 0.18);
            --body-bg:
                radial-gradient(circle at 18% 18%, rgba(255, 210, 194, 0.7), transparent 26rem),
                radial-gradient(circle at 82% 12%, rgba(239, 111, 154, 0.18), transparent 24rem),
                linear-gradient(135deg, var(--bg), #fffaf1);
            --app-bg: rgba(255, 255, 255, 0.88);
            --hero-bg:
                linear-gradient(135deg, rgba(255, 232, 239, 0.96), rgba(255, 210, 194, 0.9)),
                var(--rose);
            --hero-mark:
                linear-gradient(45deg, transparent 42%, rgba(255, 255, 255, 0.65) 43% 57%, transparent 58%),
                linear-gradient(135deg, #ff8ab0, #ffd0bf);
            --message-bg: linear-gradient(180deg, #fff, #fff8fa);
        }

        body[data-theme="white"] {
            --bg: #f8fafc;
            --text: #243040;
            --muted: #667085;
            --pink: #e66792;
            --pink-dark: #b83263;
            --peach: #ffffff;
            --rose: #ffffff;
            --border: #d7dee8;
            --shadow: rgba(46, 62, 86, 0.12);
            --body-bg:
                radial-gradient(circle at 16% 16%, rgba(230, 103, 146, 0.11), transparent 22rem),
                radial-gradient(circle at 84% 18%, rgba(160, 174, 192, 0.2), transparent 24rem),
                linear-gradient(135deg, #ffffff, #f4f7fb);
            --app-bg: rgba(255, 255, 255, 0.96);
            --hero-bg: linear-gradient(135deg, #ffffff, #f7f9fc);
            --hero-mark:
                linear-gradient(45deg, transparent 42%, rgba(255, 255, 255, 0.75) 43% 57%, transparent 58%),
                linear-gradient(135deg, #eef2f7, #ffffff);
            --message-bg: linear-gradient(180deg, #ffffff, #fbfcfe);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, "Noto Sans KR", sans-serif;
            color: var(--text);
            background: var(--body-bg);
        }

        .page {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 28px 16px;
        }

        .app {
            width: min(720px, 100%);
            overflow: hidden;
            border: 1px solid rgba(244, 189, 204, 0.85);
            border-radius: 28px;
            background: var(--app-bg);
            box-shadow: 0 24px 70px var(--shadow);
        }

        .hero {
            position: relative;
            padding: 34px 28px 26px;
            background: var(--hero-bg);
        }

        .theme-bar {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 22px;
        }

        .theme-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.68);
            padding: 4px;
        }

        .theme-option {
            min-height: 36px;
            border-radius: 999px;
            color: var(--muted);
            background: transparent;
            box-shadow: none;
            font-size: 0.92rem;
            padding: 6px 14px;
        }

        .theme-option.active {
            color: #fff;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            box-shadow: 0 8px 18px rgba(207, 70, 118, 0.2);
        }

        .hero::after {
            content: "";
            position: absolute;
            right: 24px;
            top: 24px;
            width: 92px;
            height: 92px;
            border-radius: 32px;
            background: var(--hero-mark);
            opacity: 0.8;
            transform: rotate(8deg);
        }

        h1 {
            position: relative;
            z-index: 1;
            margin: 0;
            max-width: 520px;
            font-size: clamp(2rem, 7vw, 3.75rem);
            line-height: 1.08;
            letter-spacing: 0;
        }

        .subtitle {
            position: relative;
            z-index: 1;
            margin: 14px 0 0;
            max-width: 520px;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .content {
            padding: 28px;
        }

        .message-box {
            display: grid;
            min-height: 190px;
            place-items: center;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--message-bg);
            padding: 28px;
        }

        #message {
            margin: 0;
            text-align: center;
            font-size: clamp(1.35rem, 4vw, 2rem);
            font-weight: 700;
            line-height: 1.45;
            word-break: keep-all;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            min-height: 52px;
            border: 0;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        button:active {
            transform: translateY(1px);
        }

        button:focus-visible {
            outline: 3px solid rgba(239, 111, 154, 0.35);
            outline-offset: 3px;
        }

        #recommend-button {
            color: #fff;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            box-shadow: 0 12px 28px rgba(207, 70, 118, 0.26);
        }

        #copy-button {
            color: var(--pink-dark);
            background: #fff;
            border: 1px solid var(--border);
        }

        #copy-button.copied {
            color: #fff;
            background: #b44d74;
            border-color: #b44d74;
        }

        .date-line {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .partnership {
            margin-top: 28px;
            border-top: 1px solid var(--border);
            padding-top: 28px;
        }

        .partnership h2 {
            margin: 0;
            font-size: 1.45rem;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .partnership-copy {
            margin: 8px 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        .partnership-form {
            display: grid;
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .field label {
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--text);
            font: inherit;
            line-height: 1.4;
            padding: 12px 14px;
        }

        .field textarea {
            min-height: 116px;
            resize: vertical;
        }

        .field input:focus-visible,
        .field select:focus-visible,
        .field textarea:focus-visible {
            outline: 3px solid rgba(239, 111, 154, 0.28);
            outline-offset: 2px;
        }

        #partnership-submit {
            color: #fff;
            background: linear-gradient(135deg, var(--pink), var(--pink-dark));
            box-shadow: 0 12px 28px rgba(207, 70, 118, 0.2);
        }

        .form-status {
            min-height: 24px;
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-status.success {
            color: #227447;
        }

        .form-status.error {
            color: #b42318;
        }

        @media (max-width: 560px) {
            .app {
                border-radius: 22px;
            }

            .hero,
            .content {
                padding: 24px 18px;
            }

            .hero::after {
                width: 64px;
                height: 64px;
                border-radius: 22px;
                right: 16px;
                top: 18px;
            }

            .theme-bar {
                justify-content: flex-start;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="app" aria-label="예지에게 보내는 응원 문구 추천기">
            <header class="hero">
                <div class="theme-bar" aria-label="화면 모드 선택">
                    <div class="theme-toggle" role="group" aria-label="테마 선택">
                        <button class="theme-option active" type="button" data-theme-value="pink">핑크 모드</button>
                        <button class="theme-option" type="button" data-theme-value="white">화이트 모드</button>
                    </div>
                </div>
                <h1>예지에게 보내는 오늘의 응원</h1>
                <p class="subtitle">매일 다른 마음으로, 따뜻하게 전할 수 있는 한 문장을 골라줘요.</p>
            </header>

            <section class="content">
                <div class="message-box" aria-live="polite">
                    <p id="message"></p>
                </div>

                <div class="actions">
                    <button id="recommend-button" type="button">문구 추천받기</button>
                    <button id="copy-button" type="button">문구 복사하기</button>
                </div>

                <p class="date-line" id="date-line"></p>

                <section class="partnership" aria-labelledby="partnership-title">
                    <h2 id="partnership-title">제휴 문의</h2>
                    <p class="partnership-copy">함께 해보고 싶은 제안이 있다면 간단히 남겨주세요.</p>

                    <form class="partnership-form" id="partnership-form" action="https://formspree.io/f/xvzdlljk" method="POST">
                        <div class="field">
                            <label for="partner-name">이름</label>
                            <input id="partner-name" name="name" type="text" autocomplete="name" required>
                        </div>

                        <div class="field">
                            <label for="partner-email">이메일</label>
                            <input id="partner-email" name="email" type="email" autocomplete="email" required>
                        </div>

                        <div class="field">
                            <label for="partner-type">제휴 유형</label>
                            <select id="partner-type" name="partnership_type" required>
                                <option value="">선택해주세요</option>
                                <option value="brand">브랜드 제휴</option>
                                <option value="content">콘텐츠 협업</option>
                                <option value="event">이벤트/프로모션</option>
                                <option value="other">기타 제안</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="partner-message">제안 내용</label>
                            <textarea id="partner-message" name="message" placeholder="제휴 목적, 진행 방식, 연락 가능한 시간 등을 적어주세요." required></textarea>
                        </div>

                        <input type="hidden" name="_subject" value="예지 응원 사이트 제휴 문의">
                        <button id="partnership-submit" type="submit">제휴 문의 보내기</button>
                        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
                    </form>
                </section>
            </section>
        </section>
    </main>

    <script>
        const messages = [
            "예지야, 오늘도 네가 해내는 모든 순간을 믿고 응원해.",
            "예지야, 완벽하지 않아도 괜찮아. 너는 충분히 잘하고 있어.",
            "오늘 하루도 예지답게 천천히, 단단하게 걸어가면 돼.",
            "예지야, 네가 웃는 순간들이 오늘 더 많이 생기길 바라.",
            "힘든 일이 있어도 예지는 분명 잘 넘길 수 있는 사람이야.",
            "예지야, 오늘의 작은 노력들이 내일의 너를 더 빛나게 할 거야.",
            "네 편에서 늘 응원하고 있어. 예지야, 오늘도 파이팅.",
            "예지야, 쉬어가도 괜찮아. 중요한 건 네 마음을 지키는 거야.",
            "오늘도 예지의 따뜻함과 성실함이 분명 좋은 곳에 닿을 거야.",
            "예지야, 너는 생각보다 훨씬 강하고 멋진 사람이야.",
            "조급해하지 않아도 돼. 예지는 예지의 속도로 잘 가고 있어.",
            "예지야, 오늘 하루가 너에게 다정한 기억으로 남았으면 좋겠어."
        ];

        const messageElement = document.getElementById("message");
        const recommendButton = document.getElementById("recommend-button");
        const copyButton = document.getElementById("copy-button");
        const dateLine = document.getElementById("date-line");
        const themeButtons = document.querySelectorAll(".theme-option");
        const partnershipForm = document.getElementById("partnership-form");
        const partnershipSubmit = document.getElementById("partnership-submit");
        const formStatus = document.getElementById("form-status");
        let currentMessage = "";

        function pickMessage() {
            if (messages.length === 1) {
                return messages[0];
            }

            let nextMessage = currentMessage;
            while (nextMessage === currentMessage) {
                const index = Math.floor(Math.random() * messages.length);
                nextMessage = messages[index];
            }
            return nextMessage;
        }

        function recommendMessage() {
            currentMessage = pickMessage();
            messageElement.textContent = currentMessage;
            copyButton.textContent = "문구 복사하기";
            copyButton.classList.remove("copied");
        }

        async function copyMessage() {
            if (!currentMessage) {
                return;
            }

            const copied = await copyText(currentMessage);
            copyButton.textContent = copied ? "복사 완료" : "복사 실패";
            copyButton.classList.toggle("copied", copied);

            window.setTimeout(() => {
                copyButton.textContent = "문구 복사하기";
                copyButton.classList.remove("copied");
            }, 1600);
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (error) {
                    console.warn("Clipboard API failed, using fallback.", error);
                }
            }

            return fallbackCopyText(text);
        }

        function fallbackCopyText(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.setAttribute("readonly", "");
            textArea.style.position = "fixed";
            textArea.style.top = "-1000px";
            textArea.style.left = "-1000px";
            document.body.appendChild(textArea);
            textArea.select();

            try {
                return document.execCommand("copy");
            } catch (error) {
                console.warn("Fallback copy failed.", error);
                return false;
            } finally {
                document.body.removeChild(textArea);
            }
        }

        function setDateLine() {
            const today = new Intl.DateTimeFormat("ko-KR", {
                dateStyle: "full"
            }).format(new Date());
            dateLine.textContent = today;
        }

        function setTheme(theme) {
            const nextTheme = theme === "white" ? "white" : "pink";
            document.body.dataset.theme = nextTheme;
            localStorage.setItem("yeji-theme", nextTheme);

            themeButtons.forEach((button) => {
                const isActive = button.dataset.themeValue === nextTheme;
                button.classList.toggle("active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
        }

        async function submitPartnershipForm(event) {
            event.preventDefault();

            formStatus.textContent = "전송 중입니다...";
            formStatus.className = "form-status";
            partnershipSubmit.disabled = true;

            try {
                const response = await fetch(partnershipForm.action, {
                    method: "POST",
                    body: new FormData(partnershipForm),
                    headers: {
                        Accept: "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error("Formspree request failed");
                }

                partnershipForm.reset();
                formStatus.textContent = "제휴 문의가 전송되었습니다.";
                formStatus.className = "form-status success";
            } catch (error) {
                console.warn("Partnership form failed.", error);
                formStatus.textContent = "전송에 실패했습니다. 잠시 후 다시 시도해주세요.";
                formStatus.className = "form-status error";
            } finally {
                partnershipSubmit.disabled = false;
            }
        }

        recommendButton.addEventListener("click", recommendMessage);
        copyButton.addEventListener("click", copyMessage);
        themeButtons.forEach((button) => {
            button.addEventListener("click", () => {
                setTheme(button.dataset.themeValue);
            });
        });
        partnershipForm.addEventListener("submit", submitPartnershipForm);

        setTheme(localStorage.getItem("yeji-theme"));
        setDateLine();
        recommendMessage();
    </script>
</body>
</html>
